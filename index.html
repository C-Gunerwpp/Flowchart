<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Flowchart Studio is een lokale planningstool voor campagnes, flights en tactics." />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Flowchart Studio</title>
  <link rel="stylesheet" href="styles.css?v=19" />
</head>
<body>
<div class="ttip" id="ttip" role="tooltip" aria-hidden="true"></div>
<input type="file" id="FI" accept=".json" style="display:none" aria-hidden="true">
<div id="W"><span style="background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);padding:6px 16px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:2px;margin-bottom:24px;display:inline-block">WPP MEDIA</span><h1 class="wtt">Flowchart Studio</h1><p class="wt2">Campagne &#8594; Flight &#8594; Tactic</p><div class="wa"><button class="wbtn wbl" id="wl">&#128194; JSON laden</button><button class="wbtn wbn" id="wn">&#10024; Nieuw</button></div><div class="wdr" id="wd"><div style="font-size:36px;margin-bottom:6px">&#128196;</div><p style="font-size:11px;color:rgba(255,255,255,.5)">Of <b style="color:rgba(255,255,255,.8)">sleep een .json</b> hierheen</p></div><button class="wre" id="wr">&#128260; Vorige sessie</button><div id="recentList" class="recent-list" style="display:none"></div></div>
<div class="drop-overlay" id="dropOverlay"><div class="drop-overlay-inner">📂 Laat los om dit plan te openen</div></div>
<div id="A">
  <div class="topbar">
    <div class="tb-left">
      <div style="display:flex;align-items:center"><h1>Flowchart Studio</h1><span class="badge">v13</span></div>
      <div class="tb-client"><span class="tb-client-label">Klant</span><input id="clientIn" type="text" placeholder="Klantnaam..." value=""></div>
    </div>
    <div class="tb-right">
      <input class="tb-in tb-yr" id="yearIn" type="number" value="2026" min="2020" max="2035" title="Jaar">
      <span class="active-file-pill" id="activeFilePill" style="display:none" title="Actief bestand"></span>
      <button class="user-pill" id="userPill" title="Klik om je naam in te stellen of te wijzigen — deze naam wordt vastgelegd in elk plan dat je opslaat">✏️ Naam instellen</button>
      <button class="tb-btn" id="btnUndo" title="Ongedaan maken (Ctrl+Z)" disabled>&#8630;</button>
      <button class="tb-btn" id="btnRedo" title="Opnieuw (Ctrl+Y)" disabled>&#8631;</button>
      <span class="tb-range" id="ganttRange" title="Zichtbare periode in de Gantt">
        <button class="tb-btn" id="btnPanPrev" title="Eén maand terug">&#9664;</button>
        <span class="tb-range-lbl" id="ganttRangeLbl" title="Klik om naar vandaag te springen">–</span>
        <button class="tb-btn" id="btnPanNext" title="Eén maand vooruit">&#9654;</button>
        <input class="tb-in" id="monthCountIn" type="number" min="3" max="24" step="1" value="12" title="Aantal zichtbare maanden (3–24)" style="width:54px">
        <span class="tb-range-suf">mnd</span>
      </span>
      <button class="tb-btn" id="btnZoomOut" title="Zoom uit">&#128269;&#8722;</button>
      <span class="tb-zv" id="zoomVal" title="Zoom (klik om te resetten)">100%</span>
      <button class="tb-btn" id="btnZoomIn" title="Zoom in">&#128269;&#43;</button>
      <button class="tb-btn" id="btnToday" title="Spring naar de huidige week">&#128197; Vandaag</button>
      <button class="tb-btn ins" id="btnIns" title="Inzichten">&#128202; Inzichten</button>
      <button class="tb-btn ins" id="btnCollab" title="Versie-historie">&#128451; Versies</button>
      <button class="tb-btn save" id="btnSave">&#128190; Opslaan</button>
      <button class="tb-btn load" id="btnLoad">&#128194; Laden</button>
      <div class="tb-menu" id="tbExport">
        <button class="tb-btn" id="btnExport" title="Exporteer naar CSV, XLS of PDF" aria-haspopup="true" aria-expanded="false">&#11015;&#65039; Export &#9662;</button>
        <div class="tb-menu-list" role="menu">
          <button class="tb-menu-item" data-act="csv" role="menuitem">CSV bestand</button>
          <button class="tb-menu-item" data-act="xls" role="menuitem">XLS bestand</button>
          <button class="tb-menu-item" data-act="pdf" role="menuitem">PDF (print)</button>
        </div>
      </div>
      <button class="tb-btn" id="btnSett">&#9881;&#65039;</button>
      <span class="tb-status" id="autoSaveStatus">&#8211;</span>
    </div>
  </div>
  <div class="summary" id="summaryBar"></div>
  <div class="funnel-bar" id="funnelBar"></div>
  <div class="gantt-wrap" id="ganttWrap"><div class="gantt" id="gantt"></div></div>
  <div class="legend" id="legend"></div>
</div>
<div class="modal-bg" id="modalBg"><div class="modal" id="modal"><div class="modal-head"><div class="modal-nav" id="modalNav"></div><button class="modal-close" id="modalClose">&#10005;</button></div><div class="modal-body" id="modalBody"></div></div></div>
<div class="modal-bg" id="settBg"><div class="modal wide"><div class="modal-head"><div class="modal-nav"><strong>&#9881;&#65039; Settings</strong></div><button class="modal-close" id="settClose">&#10005;</button></div><div class="modal-body" id="settBody"></div></div></div>
<div class="modal-bg" id="cfmBg"><div class="cfm-box"><div class="cfm-icon" id="cfmIcon"></div><div class="cfm-msg" id="cfmMsg"></div><div class="cfm-btns"><button class="mbtn" id="cfmNo">Annuleer</button><button class="mbtn pri" id="cfmYes">Akkoord</button></div></div></div>
<div class="modal-bg" id="insBg"><div class="modal ins-modal"><div class="modal-head"><div class="modal-nav"><strong>&#128202; Inzichten &amp; rapportage</strong></div><button class="modal-close" id="insClose">&#10005;</button></div><div class="modal-body" id="insBody"></div></div></div>
<div class="toast-wrap" id="toastWrap"></div>
<script src="src/constants.js?v=19" defer></script>
<script src="src/state.js?v=19" defer></script>
<script src="src/utils.js?v=19" defer></script>
<script src="src/viewport.js?v=19" defer></script>
<script src="src/toast.js?v=19" defer></script>
<script src="src/calc.js?v=19" defer></script>
<script src="src/render.js?v=19" defer></script>
<script src="src/modals.js?v=19" defer></script>
<script src="src/insights.js?v=19" defer></script>
<script src="src/history.js?v=19" defer></script>
<script src="src/gantt-interact.js?v=19" defer></script>
<script src="src/collab.js?v=19" defer></script>
<script src="src/locks.js?v=19" defer></script>
<script src="src/io.js?v=19" defer></script>
<script src="src/events.js?v=19" defer></script>
</body>
</html>
