<script>
var CHNS=[{id:'tv',n:'TV',i:'📺'},{id:'radio',n:'Radio',i:'📻'},{id:'cinema',n:'Cinema',i:'🎬'},{id:'digital_audio',n:'Digital Audio',i:'🎧'},{id:'display',n:'Display',i:'🖥️'},{id:'gaming',n:'Gaming',i:'🎮'},{id:'native',n:'Native',i:'📰'},{id:'ooh',n:'Out of Home',i:'🏙️'},{id:'print',n:'Print',i:'📄'},{id:'search',n:'Search',i:'🔍'},{id:'social',n:'Social',i:'💬'},{id:'video',n:'Video (OLV)',i:'🎥'},{id:'affiliate',n:'Affiliate',i:'🔗'},{id:'branded',n:'Branded Content',i:'©️'}];
var CMET={tv:['GRPs','Reach %','OTS','Spotlengte','CPP'],radio:['GRPs','Reach %','Spotlengte','CPP'],social:['Impressies','CPM','Clicks','CTR','Qvisits','Video Views','VTR'],display:['Impressies','CPM','Clicks','CTR','Viewability','Qvisits'],video:['Views','VTR','CPCV','Impressies','CPM','Qvisits'],search:['Clicks','CPC','ROAS','Qvisits','Impressies','CTR'],digital_audio:['Impressies','Luisteraars','CPM','Bereik'],ooh:['Reach','Contacten','Frequentie'],native:['Impressies','Clicks','CTR','CPM','Qvisits'],cinema:['Bezoekers','Impressies','CPM'],gaming:['Impressies','Clicks','CPM','Qvisits'],affiliate:['Clicks','Conversies','CPA','Revenue'],branded:['Views','Engagement','Impressies','CPM'],print:['Oplage','Bereik','Kosten p/p']};
var STS=[{id:'concept',n:'Concept',c:'#F59E0B'},{id:'bevestigd',n:'Bevestigd',c:''},{id:'live',n:'Live',c:'#10B981'},{id:'afgerond',n:'Afgerond',c:'#94A3B8'}];
var PAL=['#000050','#001A8C','#0026C5','#1E40AF','#3B82F6','#60A5FA','#93C5FD','#BFDBFE','#0D9488','#14B8A6','#A2D2D0','#2DD4BF','#1E293B','#475569','#94A3B8','#CBD5E1'];
var BJ={base:1700000,mods:[]},CJ={mods:[]},TJ={mods:[]},J=1700000;
var YEAR=2026,FEES={},D=[],nid=100,NW=15,CLIENT='',exp={},expF={},sel=null,sF=null,sT=null;

function calcJ(){J=BJ.base;BJ.mods.forEach(function(m){J+=m.a});return J}
function calcCR(){var s=0;CJ.mods.forEach(function(m){s+=m.a});return s}
function calcTC(){var s=0;TJ.mods.forEach(function(m){s+=m.a});return s}
function d2w(ds){if(!ds)return 1;var d=new Date(ds+'T12:00:00');var jan4=new Date(YEAR,0,4);var dow=jan4.getDay()||7;var w1=new Date(jan4);w1.setDate(jan4.getDate()-(dow-1));return Math.max(1,Math.min(53,Math.floor((d-w1)/86400000/7)+1))}
function w2d(w){var jan4=new Date(YEAR,0,4);var dow=jan4.getDay()||7;var w1=new Date(jan4);w1.setDate(jan4.getDate()-(dow-1));var t=new Date(w1);t.setDate(w1.getDate()+(w-1)*7);return t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0')}
function tdy(){return new Date().toISOString().substring(0,10)}
function totalCB(){var s=0;D.forEach(function(c){c.segs.forEach(function(f){s+=(f.cb||0)})});return s}
function totalTC(){var s=0;D.forEach(function(c){c.segs.forEach(function(f){s+=(f.tc||0)})});return s}
function fBtac(f){return f.tac&&f.tac.length?f.tac.reduce(function(a,t){return a+t.b},0):0}
function fB(f){return f.b>0?f.b:(fBtac(f)||f.b||0)}
function cBfl(c){return c.segs.reduce(function(a,f){return a+fB(f)},0)}
function cB(c){return c.budget>0?c.budget:cBfl(c)}
function gT(){return D.reduce(function(a,c){return a+cB(c)},0)}
function cht(ch){var t=0;for(var k in ch)t+=ch[k]||0;return t}
function chFee(id,amt){var r=FEES[id]||0;return r>0?amt*(r/(1+r)):0}
function tacFee(t){var f=0;for(var k in t.ch)f+=chFee(k,t.ch[k]);return f}
function totalFee(){var f=0;D.forEach(function(c){c.segs.forEach(function(fl){(fl.tac||[]).forEach(function(t){f+=tacFee(t)})})});return f}
function fN(v){return'€'+Math.round(v).toLocaleString('nl-NL')}
function fN2(v){return'€'+v.toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.')}
function fK(v){if(!v)return'';if(v>=1e6)return'€'+(v/1e6).toFixed(1)+'M';if(v>=1e3)return'€'+Math.round(v/1e3)+'K';return'€'+v}
function gc(i,p){return i.col||p.col||'#0026C5'}
function atc(h){var r=parseInt(h.substr(1,2),16)/255,g=parseInt(h.substr(3,2),16)/255,b=parseInt(h.substr(5,2),16)/255;r=r<=.03928?r/12.92:Math.pow((r+.055)/1.055,2.4);g=g<=.03928?g/12.92:Math.pow((g+.055)/1.055,2.4);b=b<=.03928?b/12.92:Math.pow((b+.055)/1.055,2.4);return(.2126*r+.7152*g+.0722*b)>.35?'#000050':'#fff'}
function fc(id){for(var i=0;i<D.length;i++)if(D[i].id===id)return i;return-1}
function clampTactics(f){if(!f.tac)return;f.tac.forEach(function(t){if(t.sd<f.sd)t.sd=f.sd;if(t.ed>f.ed)t.ed=f.ed;if(t.ed<t.sd)t.ed=t.sd})}
function norm(c){c.forEach(function(camp){if(camp.budget==null)camp.budget=0;(camp.segs||[]).forEach(function(f){if(!f.sd)f.sd=f.s?w2d(f.s):'2026-01-05';if(!f.ed)f.ed=f.e?w2d(f.e):f.sd;if(f.cb==null)f.cb=0;if(f.tc==null)f.tc=0;if(f.b==null)f.b=0;if(!f.tac){if(f.ch&&Object.keys(f.ch).length)f.tac=[{n:f.n||'',sd:f.sd,ed:f.ed,b:f.b,ch:f.ch,col:f.col||'',nt:'',met:{}}];else f.tac=[];delete f.ch}f.tac.forEach(function(t){if(!t.sd)t.sd=t.s?w2d(t.s):f.sd;if(!t.ed)t.ed=t.e?w2d(t.e):f.ed;if(!t.ch)t.ch={};if(!t.met)t.met={}});clampTactics(f)})})}
function stColor(st){var s=STS.find(function(x){return x.id===st});return s?s.c:''}
function palHTML(s){var h='';PAL.forEach(function(c){h+='<div class="pal-sw'+(c===s?' act':'')+'" style="background:'+c+'" data-col="'+c+'"></div>'});return'<div class="pal-grid">'+h+'</div>'}

/* Custom confirm */
var cfmCb=null;
function showCfm(msg,cb,icon){document.getElementById('cfmIcon').textContent=icon||'⚠️';document.getElementById('cfmMsg').innerHTML=msg;document.getElementById('cfmBg').classList.add('open');cfmCb=cb;}
document.getElementById('cfmYes').addEventListener('click',function(){document.getElementById('cfmBg').classList.remove('open');if(cfmCb)cfmCb(true);cfmCb=null;});
document.getElementById('cfmNo').addEventListener('click',function(){document.getElementById('cfmBg').classList.remove('open');if(cfmCb)cfmCb(false);cfmCb=null;});

/* Budget check met custom confirm */
function checkCampBudget(ci,afterFn){
var c=D[ci];if(!c||c.budget<=0){if(afterFn)afterFn();return;}
var flTotal=cBfl(c);
if(flTotal>c.budget){showCfm('Flight totaal wordt <strong>'+fN(flTotal)+'</strong>.<br>Dit overschrijdt het campagne budget van '+fN(c.budget)+'.<br><br>Campagne budget ophogen naar <strong>'+fN(flTotal)+'</strong>?',function(ok){if(ok)c.budget=flTotal;if(afterFn)afterFn();},'📈');}
else if(flTotal<c.budget&&c.budget-flTotal>1000){showCfm('Flight totaal is <strong>'+fN(flTotal)+'</strong>.<br>Campagne budget is '+fN(c.budget)+' ('+fN(c.budget-flTotal)+' over).<br><br>Campagne budget verlagen naar <strong>'+fN(flTotal)+'</strong>?',function(ok){if(ok)c.budget=flTotal;if(afterFn)afterFn();},'📉');}
else{if(afterFn)afterFn();}}

/* RENDER */
function barHTML(sw,ew,col,tc,name,budget,st,attrs){var stc=stColor(st);return'<div class="g-bar" style="grid-column:'+sw+'/'+(ew+1)+';background:'+col+';color:'+tc+'"'+attrs+'>'+(name?'<span class="bn">'+name+'</span>':'')+(budget?'<span class="bb">'+fK(budget)+'</span>':'')+(stc?'<div class="g-st" style="background:'+stc+'"></div>':'')+'</div>';}
function renderHeader(){var q='<div class="g-head-q"><div class="gh-label">Campagne</div><div class="gh-budget"></div><div class="gh-weeks"><div class="gh-q" style="grid-column:1/14">Q1 '+YEAR+'</div><div class="gh-q gh-qd" style="grid-column:14/27">Q2</div><div class="gh-q gh-qd" style="grid-column:27/40">Q3</div><div class="gh-q gh-qd" style="grid-column:40/53">Q4</div></div></div>';var w='<div class="g-head-w"><div class="gh-label"></div><div class="gh-budget">Totaal</div><div class="gh-weeks">';for(var i=1;i<=52;i++){var cls='';if(i===14||i===27||i===40)cls=' gh-qd';if(i===NW)cls+=' gh-nw';w+='<div class="'+cls.trim()+'">'+i+'</div>';}return q+w+'</div></div>';}
function renderCampRow(c){var isX=!!exp[c.id],bars='';if(!isX){c.segs.forEach(function(f,fi){var sw=d2w(f.sd),ew=d2w(f.ed),col=gc(f,c),tc=atc(col),b=fB(f),sp=ew-sw+1;bars+=barHTML(sw,ew,col,tc,sp>=4?f.n:'',b,f.st||'concept',' data-ci="'+c.id+'" data-fi="'+fi+'"');});}return'<div class="g-row g-camp'+(isX?' g-exp':'')+(c.id===sel?' g-sel':'')+'" data-ci="'+c.id+'"><div class="g-label"><span class="g-toggle" data-ci="'+c.id+'">'+(isX?'▼':'▶')+'</span><span class="g-dot" style="background:'+c.col+'"></span><span class="g-name">'+c.label+'</span><span class="g-count">'+c.segs.length+'</span></div><div class="g-budget">'+fN(cB(c))+'</div><div class="g-bars">'+bars+'</div></div>';}
function renderFlightRow(c,f,fi){var fk=c.id+'_'+fi,isXF=!!expF[fk],col=gc(f,c),tc=atc(col),sw=d2w(f.sd),ew=d2w(f.ed),bars='';if(!isXF){if(f.tac&&f.tac.length){f.tac.forEach(function(t,ti){var tsw=d2w(t.sd),tew=d2w(t.ed),tcol=gc(t,{col:col}),ttc=atc(tcol);bars+=barHTML(tsw,tew,tcol,ttc,t.n,t.b,f.st||'concept',' data-ci="'+c.id+'" data-fi="'+fi+'" data-ti="'+ti+'"');});}else{bars+=barHTML(sw,ew,col,tc,f.n,fB(f),f.st||'concept',' data-ci="'+c.id+'" data-fi="'+fi+'"');}}var stc=stColor(f.st);return'<div class="g-row g-sub'+(isXF?' g-exp':'')+'" data-ci="'+c.id+'" data-fi="'+fi+'"><div class="g-label">'+(f.tac&&f.tac.length?'<span class="g-toggle" data-ci="'+c.id+'" data-fi="'+fi+'">'+(isXF?'▼':'▶')+'</span>':'<span style="width:14px"></span>')+'<span class="g-fdot" style="background:'+col+'"></span><span class="g-name">'+(f.n||'Flight '+(fi+1))+'</span>'+(stc?'<span class="g-sdot" style="background:'+stc+'"></span>':'')+'</div><div class="g-budget">'+fN(fB(f))+'</div><div class="g-bars">'+bars+'</div></div>';}
function renderTacRow(c,f,fi,t,ti){var col=gc(t,{col:gc(f,c)}),tc=atc(col),sw=d2w(t.sd),ew=d2w(t.ed);return'<div class="g-row g-tac" data-ci="'+c.id+'" data-fi="'+fi+'" data-ti="'+ti+'"><div class="g-label"><span class="g-fdot" style="background:'+col+'"></span><span class="g-name">'+(t.n||'Tactic '+(ti+1))+'</span></div><div class="g-budget">'+fN(t.b)+'</div><div class="g-bars">'+barHTML(sw,ew,col,tc,t.n,t.b,f.st||'concept',' data-ci="'+c.id+'" data-fi="'+fi+'" data-ti="'+ti+'"')+'</div></div>';}
function renderFooter(){var g=gT(),totCR=totalCB()+calcCR(),totTL=totalTC()+calcTC(),r=J-g-totCR-totTL;return'<div class="g-row g-foot g-tot"><div class="g-label">Totaal</div><div class="g-budget">'+fN(g)+'</div><div class="g-bars"></div></div><div class="g-row g-foot g-crea"><div class="g-label">🎨 Creatie</div><div class="g-budget">'+fN(totCR)+'</div><div class="g-bars"></div></div><div class="g-row g-foot g-tool"><div class="g-label">🔧 Tooling</div><div class="g-budget">'+fN(totTL)+'</div><div class="g-bars"></div></div><div class="g-row g-foot g-jaar"><div class="g-label">Jaarbudget</div><div class="g-budget">'+fN(J)+'</div><div class="g-bars"></div></div><div class="g-row g-foot g-rest'+(r<0?' neg':'')+'"><div class="g-label">Resterend</div><div class="g-budget">'+fN(r)+'</div><div class="g-bars"></div></div>';}
function renderGantt(){var h=renderHeader();if(!D.length){h+='<div style="display:flex;justify-content:center;padding:60px;color:#94A3B8;font-size:12px">Klik <strong style="color:#0026C5;margin:0 4px">+ Campagne</strong> of laad een JSON</div>';}else{var ls='';D.forEach(function(c){if(c.sec!==ls){ls=c.sec;h+='<div class="g-sec">'+(c.sec==='ao'?'ALWAYS-ON':'CAMPAGNES')+'</div>';}h+=renderCampRow(c);if(exp[c.id]){c.segs.forEach(function(f,fi){h+=renderFlightRow(c,f,fi);if(expF[c.id+'_'+fi]&&f.tac){f.tac.forEach(function(t,ti){h+=renderTacRow(c,f,fi,t,ti);});}});}});h+=renderFooter();}document.getElementById('gantt').innerHTML=h;}
function renderSummary(){var t=gT(),fee=totalFee(),net=t-fee,totCR=totalCB()+calcCR(),totTL=totalTC()+calcTC(),r=J-t-totCR-totTL;document.getElementById('summaryBar').innerHTML='<div class="scard s-click" id="scJ"><div class="sl">Jaarbudget</div><div class="sv">'+fN(J)+'</div><div class="sd">'+(BJ.mods.length?'Basis '+fN(BJ.base)+' + '+BJ.mods.length+' wijz.':'Klik voor journal')+'</div></div><div class="scard s-media"><div class="sl">Netto Media</div><div class="sv">'+fN(net)+'</div></div><div class="scard s-fee"><div class="sl">Handling Fee</div><div class="sv">'+fN(fee)+'</div></div><div class="scard s-crea s-click" id="scC"><div class="sl">Creatie</div><div class="sv">'+fN(totCR)+'</div></div><div class="scard s-tool s-click" id="scT"><div class="sl">Tooling</div><div class="sv">'+fN(totTL)+'</div></div><div class="scard s-rest"><div class="sl">Resterend</div><div class="sv" style="color:'+(r<0?'#DC2626':'#059669')+'">'+fN(r)+'</div></div><div class="scard s-add" id="addCampBtn">+ Campagne</div>';}
function renderLegend(){var h='<span style="font-weight:700;font-size:7px;color:#000050">CAMPAGNES:</span>';D.forEach(function(c){h+='<div class="leg-item"><div class="leg-dot" style="background:'+c.col+'"></div>'+c.label+'</div>';});h+='<span style="margin-left:14px;font-weight:700;font-size:7px;color:#000050">STATUS:</span>';STS.forEach(function(s){h+='<div class="leg-item"><div class="leg-st" style="background:'+(s.c||'#0026C5')+'"><div class="lst" style="background:'+(s.c||'transparent')+'"></div></div>'+s.n+'</div>';});document.getElementById('legend').innerHTML=h;}
function render(){renderGantt();renderSummary();renderLegend();aS();}
function renderSettings(){var h='<div class="sett-sec"><h4>💰 Budget Journal</h4><div class="j-row"><span class="j-lbl">📊 Basisbudget</span><input type="number" class="j-amt" id="sjBase" value="'+BJ.base+'" step="1000"></div>';BJ.mods.forEach(function(m,i){h+='<div class="j-row"><span class="j-sign '+(m.a>=0?'j-pos':'j-neg')+'">'+(m.a>=0?'+':'')+'</span><input type="number" class="j-amt sjm-a" data-j="bj" data-i="'+i+'" value="'+m.a+'" step="1000"><input type="text" class="j-nt sjm-n" data-j="bj" data-i="'+i+'" value="'+(m.n||'').replace(/"/g,'&quot;')+'" placeholder="Notitie"><button class="j-del sjm-d" data-j="bj" data-i="'+i+'">✕</button></div>';});h+='<div style="margin-top:6px"><button class="mbtn sjm-add" data-j="bj">+ Wijziging</button></div><div class="j-total">Totaal: <strong>'+fN(J)+'</strong></div></div>';var tcb=totalCB();h+='<div class="sett-sec"><h4>🎨 Creatie</h4><div class="j-row"><span class="j-lbl">📋 Flights</span><span class="j-auto">'+fN(tcb)+' (auto)</span></div>';CJ.mods.forEach(function(m,i){h+='<div class="j-row"><span class="j-sign '+(m.a>=0?'j-pos':'j-neg')+'">'+(m.a>=0?'+':'')+'</span><input type="number" class="j-amt sjm-a" data-j="cj" data-i="'+i+'" value="'+m.a+'" step="100"><input type="text" class="j-nt sjm-n" data-j="cj" data-i="'+i+'" value="'+(m.n||'').replace(/"/g,'&quot;')+'" placeholder="Notitie"><button class="j-del sjm-d" data-j="cj" data-i="'+i+'">✕</button></div>';});h+='<div style="margin-top:6px"><button class="mbtn sjm-add" data-j="cj">+ Overig creatie</button></div><div class="j-total">Totaal: <strong>'+fN(tcb+calcCR())+'</strong></div></div>';var ttc=totalTC();h+='<div class="sett-sec"><h4>🔧 Tooling</h4><div class="j-row"><span class="j-lbl">📋 Flights</span><span class="j-auto">'+fN(ttc)+' (auto)</span></div>';TJ.mods.forEach(function(m,i){h+='<div class="j-row"><span class="j-sign '+(m.a>=0?'j-pos':'j-neg')+'">'+(m.a>=0?'+':'')+'</span><input type="number" class="j-amt sjm-a" data-j="tj" data-i="'+i+'" value="'+m.a+'" step="100"><input type="text" class="j-nt sjm-n" data-j="tj" data-i="'+i+'" value="'+(m.n||'').replace(/"/g,'&quot;')+'" placeholder="Notitie"><button class="j-del sjm-d" data-j="tj" data-i="'+i+'">✕</button></div>';});h+='<div style="margin-top:6px"><button class="mbtn sjm-add" data-j="tj">+ Overig tooling</button></div><div class="j-total">Totaal: <strong>'+fN(ttc+calcTC())+'</strong></div></div>';h+='<div class="sett-sec"><h4>⚙️ Handling Fee per kanaal</h4><p style="font-size:9px;color:#6B7280;margin-bottom:8px">Budgetten incl. fee. Fee = budget × (% / (100 + %)).</p><div class="fee-grid">';CHNS.forEach(function(ch){var rawPct=FEES[ch.id]?FEES[ch.id]*100:0;var dp=rawPct?String(parseFloat(rawPct.toPrecision(10))):'';h+='<div class="fee-item"><label>'+ch.i+' '+ch.n+'</label><input type="number" class="sf-in" data-ch="'+ch.id+'" value="'+dp+'" placeholder="0" min="0" max="50" step="any"> %</div>';});h+='</div></div>';document.getElementById('settBody').innerHTML=h;}

/* ═══ SAVE/LOAD ═══ */
function aS(){try{CLIENT=document.getElementById('clientIn').value;localStorage.setItem('fs13',JSON.stringify({bj:BJ,cj:CJ,tj:TJ,D:D,n:nid,fees:FEES,yr:YEAR,client:CLIENT}));document.getElementById('autoSaveStatus').textContent='✓ '+new Date().toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'})}catch(e){}}
function hL(){try{var d=localStorage.getItem('fs13');return d&&JSON.parse(d).D&&JSON.parse(d).D.length>0}catch(e){return false}}
function lL(){try{var d=JSON.parse(localStorage.getItem('fs13'));if(d.bj)BJ=d.bj;else BJ={base:d.j||1700000,mods:[]};calcJ();if(d.cj)CJ=d.cj;else CJ={mods:d.c>0?[{a:d.c,n:'Overig'}]:[]};if(d.tj)TJ=d.tj;else TJ={mods:d.t>0?[{a:d.t,n:'Overig'}]:[]};YEAR=d.yr||2026;CLIENT=d.client||'';D=d.D;nid=d.n||100;FEES=d.fees||{};norm(D)}catch(e){}}

document.getElementById('gantt').addEventListener('mouseout',function(e){if(e.target.closest('.g-bar'))ttTimer=setTimeout(function(){ttEl.classList.remove('vis')},150);});

/* Modal body clicks — custom confirms */
document.getElementById('modalBody').addEventListener('click',function(e){var ci=fc(sel);if(ci<0)return;
var fi=e.target.closest('.m-item[data-fi]');if(fi&&sF===null){showFlightModal(ci,parseInt(fi.dataset.fi));return;}
var ti=e.target.closest('.m-item[data-ti]');if(ti&&sF!==null&&sT===null){showTacticModal(ci,sF,parseInt(ti.dataset.ti));return;}
var ps=e.target.closest('.pal-sw');if(ps){var col=ps.dataset.col;if(sT!==null)D[ci].segs[sF].tac[sT].col=col;else if(sF===null)D[ci].col=col;if(sT!==null)showTacticModal(ci,sF,sT);else showCampModal(ci);return;}
if(e.target.id==='mFadd'){D[ci].segs.push({n:'',sd:tdy(),ed:tdy(),b:0,cb:0,tc:0,col:'',st:'concept',nt:'',tac:[]});showCampModal(ci);return;}
if(e.target.id==='mTadd'&&sF!==null){var fl=D[ci].segs[sF];fl.tac.push({n:'',sd:fl.sd,ed:fl.ed,b:0,ch:{},col:'',nt:'',met:{}});showFlightModal(ci,sF);return;}
if(e.target.id==='mCdel'){showCfm('Weet je zeker dat je <strong>'+D[ci].label+'</strong> wilt verwijderen?<br><br>Dit kan niet ongedaan worden gemaakt.',function(ok){if(ok){D.splice(ci,1);closeModal();}},'🗑️');return;}
if(e.target.id==='mFdel'&&sF!==null){showCfm('Flight <strong>'+(D[ci].segs[sF].n||'')+'</strong> verwijderen?',function(ok){if(ok){D[ci].segs.splice(sF,1);sF=null;showCampModal(ci);}},'🗑️');return;}
if(e.target.id==='mTdel'&&sT!==null){showCfm('Tactic verwijderen?',function(ok){if(ok){D[ci].segs[sF].tac.splice(sT,1);sT=null;document.getElementById('modal').classList.remove('wide');showFlightModal(ci,sF);}},'🗑️');return;}
if(e.target.id==='mFdup'&&sF!==null){D[ci].segs.push(JSON.parse(JSON.stringify(D[ci].segs[sF])));showCampModal(ci);return;}
if(e.target.id==='mCdup'){var nc=JSON.parse(JSON.stringify(D[ci]));nc.id=nid++;nc.label+=' (kopie)';nc.col=PAL[(ci+4)%PAL.length];D.splice(ci+1,0,nc);closeModal();return;}
if(e.target.id==='mCup'){if(ci>0&&D[ci].sec===D[ci-1].sec){var tmp=D[ci];D[ci]=D[ci-1];D[ci-1]=tmp;showCampModal(ci-1);}return;}
if(e.target.id==='mCdn'){if(ci<D.length-1&&D[ci].sec===D[ci+1].sec){var tmp2=D[ci];D[ci]=D[ci+1];D[ci+1]=tmp2;showCampModal(ci+1);}return;}
});

/* Modal body changes — budget met callback */
document.getElementById('modalBody').addEventListener('change',function(e){var ci=fc(sel);if(ci<0)return;var el=e.target;
if(el.classList.contains('chv')){if(sF===null||sT===null)return;var t=D[ci].segs[sF].tac[sT];if(!t.ch)t.ch={};t.ch[el.dataset.ch]=parseFloat(el.value)||0;if(!t.ch[el.dataset.ch])delete t.ch[el.dataset.ch];showTacticModal(ci,sF,sT);return;}
if(el.classList.contains('metv')){if(sF===null||sT===null)return;var t2=D[ci].segs[sF].tac[sT];if(!t2.met)t2.met={};if(!t2.met[el.dataset.ch])t2.met[el.dataset.ch]={};t2.met[el.dataset.ch][el.dataset.mk]=el.value;aS();return;}
if(el.id==='mCname'){D[ci].label=el.value.trim()||D[ci].label;showCampModal(ci);return;}
if(el.id==='mCsec'){D[ci].sec=el.value;D.sort(function(a,b){return a.sec==='losse'&&b.sec==='ao'?-1:a.sec==='ao'&&b.sec==='losse'?1:0});showCampModal(fc(sel));return;}
if(el.id==='mCbudget'){D[ci].budget=parseFloat(el.value)||0;showCampModal(ci);return;}
if(sF!==null){var f=D[ci].segs[sF];
if(el.id==='mFname'){f.n=el.value;showFlightModal(ci,sF);return;}
if(el.id==='mFst'){f.st=el.value;showFlightModal(ci,sF);return;}
if(el.id==='mFsd'){f.sd=el.value;clampTactics(f);showFlightModal(ci,sF);return;}
if(el.id==='mFed'){f.ed=el.value;if(f.ed<f.sd)f.ed=f.sd;clampTactics(f);showFlightModal(ci,sF);return;}
if(el.id==='mFsw'){var wk=parseInt(el.value);if(wk>=1&&wk<=53){f.sd=w2d(wk);clampTactics(f);showFlightModal(ci,sF);}return;}
if(el.id==='mFew'){var wk2=parseInt(el.value);if(wk2>=1&&wk2<=53){f.ed=w2d(wk2);if(f.ed<f.sd)f.ed=f.sd;clampTactics(f);showFlightModal(ci,sF);}return;}
if(el.id==='mFb'){f.b=parseFloat(el.value)||0;checkCampBudget(ci,function(){showFlightModal(ci,sF);});return;}
if(el.id==='mFcb'){f.cb=parseFloat(el.value)||0;showFlightModal(ci,sF);return;}
if(el.id==='mFtc'){f.tc=parseFloat(el.value)||0;showFlightModal(ci,sF);return;}}
if(sT!==null&&sF!==null){var t3=D[ci].segs[sF].tac[sT];var fl2=D[ci].segs[sF];
if(el.id==='mTname'){t3.n=el.value;showTacticModal(ci,sF,sT);return;}
if(el.id==='mTsd'){t3.sd=el.value;if(t3.sd<fl2.sd)t3.sd=fl2.sd;if(t3.sd>fl2.ed)t3.sd=fl2.ed;showTacticModal(ci,sF,sT);return;}
if(el.id==='mTed'){t3.ed=el.value;if(t3.ed<t3.sd)t3.ed=t3.sd;if(t3.ed>fl2.ed)t3.ed=fl2.ed;showTacticModal(ci,sF,sT);return;}
if(el.id==='mTsw'){var wk3=parseInt(el.value);if(wk3>=1&&wk3<=53){t3.sd=w2d(wk3);if(t3.sd<fl2.sd)t3.sd=fl2.sd;showTacticModal(ci,sF,sT);}return;}
if(el.id==='mTew'){var wk4=parseInt(el.value);if(wk4>=1&&wk4<=53){t3.ed=w2d(wk4);if(t3.ed<t3.sd)t3.ed=t3.sd;if(t3.ed>fl2.ed)t3.ed=fl2.ed;showTacticModal(ci,sF,sT);}return;}
if(el.id==='mTb'){t3.b=parseFloat(el.value)||0;checkCampBudget(ci,function(){showTacticModal(ci,sF,sT);});return;}
if(el.id==='mTnt'){t3.nt=el.value;aS();return;}}
});

/* Settings */
function getJ(j){if(j==='bj')return BJ;if(j==='cj')return CJ;if(j==='tj')return TJ;return null}
function afterSett(){calcJ();renderSettings();render();}
document.getElementById('settBody').addEventListener('change',function(e){var el=e.target;if(el.id==='sjBase'){BJ.base=parseFloat(el.value)||0;afterSett();return;}if(el.classList.contains('sjm-a')){var obj=getJ(el.dataset.j);if(obj){obj.mods[parseInt(el.dataset.i)].a=parseFloat(el.value)||0;afterSett();}return;}if(el.classList.contains('sjm-n')){var obj2=getJ(el.dataset.j);if(obj2){obj2.mods[parseInt(el.dataset.i)].n=el.value;aS();}return;}if(el.classList.contains('sf-in')){var ch=el.dataset.ch,v=parseFloat(el.value);if(isNaN(v)||v<=0)delete FEES[ch];else FEES[ch]=v/100;afterSett();return;}});
document.getElementById('settBody').addEventListener('click',function(e){var t=e.target;if(t.classList.contains('sjm-add')){var obj=getJ(t.dataset.j);if(obj){obj.mods.push({a:0,n:''});afterSett();}return;}if(t.classList.contains('sjm-d')){var obj2=getJ(t.dataset.j);if(obj2){obj2.mods.splice(parseInt(t.dataset.i),1);afterSett();}return;}});
